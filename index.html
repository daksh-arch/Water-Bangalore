<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangalore Urban Water Flow – 2021</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
 body {
  font-family: 'Open Sans', Arial, sans-serif;
  margin: 0;
  padding: 40px;
  background: #f6f6f6;
  color: #333;
 }
 h1 {
  font-family: 'Merriweather', serif;
  font-size: 2.5em;
  font-weight: 700;
  margin-bottom: 0.2em;
  color: #111;
 }
 h2 {
  font-family: 'Merriweather', serif;
  font-size: 1.3em;
  font-weight: 300;
  margin-top: 0;
  margin-bottom: 2em;
  color: #555;
 }
 #chart {
  width: 100%;
  height: 600px;
  margin-top: 20px;
 }
 svg {
  width: 100%;
  height: 100%;
 }
 .node rect {
  stroke: #1b5278;
  rx: 2;
  transition: fill-opacity 0.3s;
 }
 .node rect:hover {
  fill-opacity: 0.8;
 }
 .node text {
  pointer-events: none;
  font-size: 13px;
  fill: #111;
 }
 .link {
  fill: none;
  stroke-opacity: 0.4;
  transition: stroke-opacity 0.3s;
 }
 .link:hover {
  stroke-opacity: 0.7;
 }
 .tooltip {
  position: absolute;
  padding: 6px 8px;
  background: rgba(0,0,0,0.7);
  color: white;
  border-radius: 4px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
 }
</style>
</head>
<body>
<h1>Bangalore Urban Water Flow – 2021</h1>
<h2>Indicative flows in million litres per day (MLD)</h2>
<div id="chart"></div>
<div class="tooltip" id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
const nodes = [
  { name: "Cauvery" },
  { name: "Groundwater" },
  { name: "Rainwater" },
  { name: "Domestic" },
  { name: "Industrial" },
  { name: "C&I" },
  { name: "Construction" },
  { name: "Green Spaces" },
  { name: "Wastewater" },
  { name: "Treated" },
  { name: "Untreated" },
  { name: "Reused" },
  { name: "Leakage" },
  { name: "Recharge" }
];

const links = [
  { source: 0, target: 3, value: 1018 },
  { source: 1, target: 3, value: 872 },
  { source: 1, target: 4, value: 428 },
  { source: 1, target: 5, value: 47 },
  { source: 1, target: 6, value: 78 },
  { source: 1, target: 7, value: 24 },
  { source: 2, target: 3, value: 19 },
  { source: 3, target: 8, value: 1512 },
  { source: 4, target: 8, value: 265 },
  { source: 5, target: 8, value: 164 },
  { source: 8, target: 9, value: 1489 },
  { source: 8, target: 10, value: 451 },
  { source: 9, target: 11, value: 582 },
  { source: 12, target: 13, value: 455 }
];

const width = document.getElementById('chart').clientWidth;
const height = document.getElementById('chart').clientHeight;

const svg = d3.select('#chart').append('svg')
  .attr('viewBox', [0, 0, width, height]);

const color = d3.scaleOrdinal(d3.schemeTableau10);

const sankey = d3.sankey()
  .nodeWidth(15)
  .nodePadding(10)
  .extent([[1, 1], [width - 1, height - 6]]);

sankey({ nodes, links });

const tooltip = d3.select('#tooltip');

const link = svg.append('g')
  .selectAll('path')
  .data(links)
  .join('path')
    .attr('class', 'link')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('stroke', d => color(d.source.name))
    .attr('stroke-width', d => Math.max(1, d.width))
    .attr('opacity', 0);

link.transition().duration(750).attr('opacity', 1);

link.on('mouseover', (event, d) => {
      tooltip.style('opacity', 1)
             .text(`Flow from ${d.source.name} to ${d.target.name}: ${d.value} MLD`);
    })
    .on('mousemove', event => {
      tooltip.style('left', (event.pageX + 10) + 'px')
             .style('top', (event.pageY - 20) + 'px');
    })
    .on('mouseout', () => tooltip.style('opacity', 0));

const node = svg.append('g')
  .selectAll('g')
  .data(nodes)
  .join('g')
    .attr('class', 'node');

node.append('rect')
    .attr('x', d => d.x0)
    .attr('y', d => d.y0)
    .attr('height', d => d.y1 - d.y0)
    .attr('width', d => d.x1 - d.x0)
    .attr('fill', d => color(d.name))
    .attr('opacity', 0)
  .transition()
    .duration(750)
    .attr('opacity', 1);

const nodeText = node.append('text')
    .attr('x', d => d.x0 - 6)
    .attr('y', d => (d.y1 + d.y0) / 2)
    .attr('dy', '0.35em')
    .attr('text-anchor', 'end')
    .text(d => d.name)
    .attr('opacity', 0);

nodeText.filter(d => d.x0 < width / 2)
    .attr('x', d => d.x1 + 6)
    .attr('text-anchor', 'start');

nodeText.transition().duration(750).attr('opacity', 1);

window.addEventListener('resize', () => {
  const newWidth = document.getElementById('chart').clientWidth;
  const newHeight = document.getElementById('chart').clientHeight;
  sankey.extent([[1, 1], [newWidth - 1, newHeight - 6]]);
  sankey({ nodes, links });
  svg.attr('viewBox', [0, 0, newWidth, newHeight]);
  svg.selectAll('.link')
      .attr('d', d3.sankeyLinkHorizontal())
      .attr('stroke-width', d => Math.max(1, d.width))
      .attr('stroke', d => color(d.source.name));
  node.selectAll('rect')
      .attr('x', d => d.x0)
      .attr('y', d => d.y0)
      .attr('height', d => d.y1 - d.y0)
      .attr('width', d => d.x1 - d.x0)
      .attr('fill', d => color(d.name));
  node.selectAll('text')
      .attr('x', d => d.x0 - 6)
      .attr('y', d => (d.y1 + d.y0) / 2)
      .filter(d => d.x0 < newWidth / 2)
        .attr('x', d => d.x1 + 6);
});
</script>
</body>
</html>
